```html
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WW2 Dogfight</title>

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
width:100%;
height:100%;
background:#87CEEB;
font-family:Arial;
}

canvas{
display:block;
}

#hud{
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:10px;
}

#message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:28px;
background:rgba(0,0,0,0.6);
padding:20px;
border-radius:10px;
}

</style>
</head>

<body>

<div id="hud">
Corsair HP: <span id="php">100</span><br>
FW190 HP: <span id="ehp">100</span>
</div>

<div id="message">CLICK SCREEN TO START</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
10000
);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

window.addEventListener("resize",()=>{
renderer.setSize(window.innerWidth,window.innerHeight);
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
});


// FULLSCREEN START

document.body.addEventListener("click",()=>{
document.getElementById("message").style.display="none";
if(!document.fullscreenElement){
document.body.requestFullscreen();
}
});


// SUN LIGHT

const sun = new THREE.DirectionalLight(0xffffff,1.6);
sun.position.set(300,500,200);
scene.add(sun);

const ambient = new THREE.AmbientLight(0xffffff,0.7);
scene.add(ambient);


// OCEAN

const oceanGeo = new THREE.PlaneGeometry(20000,20000);
const oceanMat = new THREE.MeshStandardMaterial({color:0x0066aa});
const ocean = new THREE.Mesh(oceanGeo,oceanMat);

ocean.rotation.x=-Math.PI/2;
scene.add(ocean);


// CLOUDS

function cloud(x,y,z){

const geo = new THREE.SphereGeometry(15,8,8);
const mat = new THREE.MeshStandardMaterial({color:0xffffff});
const c = new THREE.Mesh(geo,mat);

c.position.set(x,y,z);
scene.add(c);

}

for(let i=0;i<40;i++){

cloud(
Math.random()*4000-2000,
200+Math.random()*300,
Math.random()*4000-2000
);

}


// PLAYER PLANE

function playerPlaneModel(){

const group = new THREE.Group();

const body = new THREE.Mesh(
new THREE.BoxGeometry(1,1,6),
new THREE.MeshStandardMaterial({color:0x002288})
);

const wing = new THREE.Mesh(
new THREE.BoxGeometry(8,0.2,1),
new THREE.MeshStandardMaterial({color:0x002288})
);

wing.position.y=-0.3;

const tail = new THREE.Mesh(
new THREE.BoxGeometry(1,1,2),
new THREE.MeshStandardMaterial({color:0x002288})
);

tail.position.z=3;

group.add(body);
group.add(wing);
group.add(tail);

return group;

}

const playerPlane = playerPlaneModel();
scene.add(playerPlane);


// ENEMY PLANE

function enemyPlaneModel(){

const group = new THREE.Group();

const body = new THREE.Mesh(
new THREE.BoxGeometry(1,1,5),
new THREE.MeshStandardMaterial({color:0xaa0000})
);

const wing = new THREE.Mesh(
new THREE.BoxGeometry(6,0.2,1),
new THREE.MeshStandardMaterial({color:0xaa0000})
);

group.add(body);
group.add(wing);

return group;

}

const enemyPlane = enemyPlaneModel();
enemyPlane.position.set(200,80,-200);
scene.add(enemyPlane);


// GAME VARIABLES

let playerHP=100;
let enemyHP=100;

let bullets=[];
let enemyBullets=[];

let keys={};

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);


// PLAYER SHOOT

function shoot(){

const bullet = new THREE.Mesh(
new THREE.SphereGeometry(0.6,6,6),
new THREE.MeshBasicMaterial({color:0xffff00})
);

bullet.position.copy(playerPlane.position);
bullet.rotation.copy(playerPlane.rotation);

scene.add(bullet);
bullets.push(bullet);

}

setInterval(()=>{
if(keys[" "]) shoot();
},150);


// ENEMY SHOOT

function enemyShoot(){

const bullet = new THREE.Mesh(
new THREE.SphereGeometry(0.6,6,6),
new THREE.MeshBasicMaterial({color:0xff0000})
);

bullet.position.copy(enemyPlane.position);
bullet.rotation.copy(enemyPlane.rotation);

scene.add(bullet);
enemyBullets.push(bullet);

}

setInterval(enemyShoot,900);


// EXPLOSION

function explosion(pos){

const boom = new THREE.Mesh(
new THREE.SphereGeometry(6,8,8),
new THREE.MeshBasicMaterial({color:0xffaa00})
);

boom.position.copy(pos);
scene.add(boom);

setTimeout(()=>scene.remove(boom),400);

}


// UPDATE

function update(){

if(keys["ArrowLeft"]) playerPlane.rotation.y+=0.04;
if(keys["ArrowRight"]) playerPlane.rotation.y-=0.04;

if(keys["ArrowUp"]) playerPlane.rotation.x+=0.02;
if(keys["ArrowDown"]) playerPlane.rotation.x-=0.02;

playerPlane.translateZ(-2);


// ENEMY AI

enemyPlane.lookAt(playerPlane.position);
enemyPlane.translateZ(-1.5);


// PLAYER BULLETS

bullets.forEach(b=>{

b.translateZ(-12);

if(b.position.distanceTo(enemyPlane.position)<5){

enemyHP-=5;
explosion(enemyPlane.position);

}

});


// ENEMY BULLETS

enemyBullets.forEach(b=>{

b.translateZ(-10);

if(b.position.distanceTo(playerPlane.position)<5){

playerHP-=5;
explosion(playerPlane.position);

}

});


document.getElementById("php").innerText=playerHP;
document.getElementById("ehp").innerText=enemyHP;


// CAMERA FOLLOW

camera.position.x=playerPlane.position.x;
camera.position.y=playerPlane.position.y+10;
camera.position.z=playerPlane.position.z+20;

camera.lookAt(playerPlane.position);

}


// GAME LOOP

function animate(){

requestAnimationFrame(animate);

update();

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
```
